name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    # 146 of 214 tests don't transitively import the Newton physics engine
    # (which is heavyweight and pre-release). We run those in CI on every
    # push so the badge stays accurate; the remaining 68 are exercised
    # locally during release builds.
    name: Unit tests (no-newton, Linux py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install OS deps for SDL (pygame backend)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 \
            libsdl2-ttf-2.0-0 libfreetype6 libjpeg62 libpng16-16

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy>=1.24 pygame-ce>=2.5.7 SpeechRecognition>=3.14.3

      - name: Run no-newton unit tests
        env:
          SDL_VIDEODRIVER: dummy
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m unittest -v \
            demo_live.tests.test_voice_fuzzy \
            demo_live.tests.test_ik \
            demo_live.tests.test_telemetry \
            demo_live.tests.test_vla_parser \
            demo_live.tests.test_vla_subprocess \
            demo_live.tests.test_effects

  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff>=0.6

      - name: ruff check
        run: ruff check demo_live/
