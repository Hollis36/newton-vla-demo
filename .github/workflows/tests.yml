name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    # The 6 modules below (101 test methods; the voice module fans out to 78
    # noisy transcripts via subTests) don't transitively import the Newton
    # physics engine (which is heavyweight and pre-release). We run those in
    # CI on every push so the badge stays accurate; the full suite — which
    # needs a sibling Newton clone — runs locally via `make test`.
    name: Unit tests (no-newton, Linux py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install OS deps for SDL (pygame backend)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 \
            libsdl2-ttf-2.0-0 libfreetype6 libjpeg62 libpng16-16

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy>=1.24 pygame-ce>=2.5.7 SpeechRecognition>=3.14.3 coverage>=7.6

      - name: Run no-newton unit tests with coverage
        env:
          SDL_VIDEODRIVER: dummy
          PYTHONPATH: ${{ github.workspace }}
        # Every other test module transitively imports demo_live.physics,
        # which imports the Newton physics engine — those run locally via
        # `make test`. The modules below cover the keyword parser, Claude
        # subprocess path, voice fuzzy-snap, telemetry CSV, the effects
        # layer, and the landing-page parity checks — all isolation-friendly.
        run: |
          coverage run --source=demo_live -m unittest -v \
            demo_live.tests.test_voice_fuzzy \
            demo_live.tests.test_telemetry \
            demo_live.tests.test_vla_parser \
            demo_live.tests.test_vla_subprocess \
            demo_live.tests.test_effects \
            demo_live.tests.test_docs_site

      - name: Report coverage to step summary
        if: always()
        run: |
          {
            echo "## Coverage report"
            echo ""
            echo '```'
            coverage report --skip-covered --skip-empty
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff>=0.6

      - name: ruff check
        run: ruff check demo_live/
