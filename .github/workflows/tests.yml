name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    # 146 of 214 tests don't transitively import the Newton physics engine
    # (which is heavyweight and pre-release). We run those in CI on every
    # push so the badge stays accurate; the remaining 68 are exercised
    # locally during release builds.
    name: Unit tests (no-newton, Linux py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install OS deps for SDL (pygame backend)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 \
            libsdl2-ttf-2.0-0 libfreetype6 libjpeg62 libpng16-16

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy>=1.24 pygame-ce>=2.5.7 SpeechRecognition>=3.14.3 coverage>=7.6

      - name: Run no-newton unit tests with coverage
        env:
          SDL_VIDEODRIVER: dummy
          PYTHONPATH: ${{ github.workspace }}
        # test_ik transitively imports demo_live.physics which imports
        # the Newton physics engine — keep it out of CI, run locally.
        # The 140 tests below cover the keyword parser, Claude
        # subprocess path, voice fuzzy-snap, telemetry CSV, and the
        # effects layer — all isolation-friendly.
        run: |
          coverage run --source=demo_live -m unittest -v \
            demo_live.tests.test_voice_fuzzy \
            demo_live.tests.test_telemetry \
            demo_live.tests.test_vla_parser \
            demo_live.tests.test_vla_subprocess \
            demo_live.tests.test_effects

      - name: Report coverage to step summary
        if: always()
        run: |
          {
            echo "## Coverage report"
            echo ""
            echo '```'
            coverage report --skip-covered --skip-empty
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff>=0.6

      - name: ruff check
        run: ruff check demo_live/
